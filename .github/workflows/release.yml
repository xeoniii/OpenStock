name: Build & Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract Version Name
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -n 1 | awk -F'"' '{print $2}')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          mkdir -p SigningKey
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > SigningKey/OpenStock-main.jks


      - name: Create signing.properties
        run: |
          echo "STORE_FILE=SigningKey/OpenStock-main.jks" > signing.properties
          echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> signing.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Create or Update Draft Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION_NAME }}
          name: Release v${{ steps.get_version.outputs.VERSION_NAME }}
          draft: true
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
